<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#242424;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
    <!-- Warm amber gradient for the letter -->
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c97a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8862a;stop-opacity:1" />
    </linearGradient>
    <!-- Vignette radial gradient -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.55" />
    </radialGradient>
    <clipPath id="roundedRect">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle film strip holes top -->
  <rect x="48"  y="40" width="28" height="42" rx="6" fill="#2e2e2e"/>
  <rect x="124" y="40" width="28" height="42" rx="6" fill="#2e2e2e"/>
  <rect x="200" y="40" width="28" height="42" rx="6" fill="#2e2e2e"/>
  <rect x="276" y="40" width="28" height="42" rx="6" fill="#2e2e2e"/>
  <rect x="352" y="40" width="28" height="42" rx="6" fill="#2e2e2e"/>
  <rect x="428" y="40" width="28" height="42" rx="6" fill="#2e2e2e"/>

  <!-- Subtle film strip holes bottom -->
  <rect x="48"  y="430" width="28" height="42" rx="6" fill="#2e2e2e"/>
  <rect x="124" y="430" width="28" height="42" rx="6" fill="#2e2e2e"/>
  <rect x="200" y="430" width="28" height="42" rx="6" fill="#2e2e2e"/>
  <rect x="276" y="430" width="28" height="42" rx="6" fill="#2e2e2e"/>
  <rect x="352" y="430" width="28" height="42" rx="6" fill="#2e2e2e"/>
  <rect x="428" y="430" width="28" height="42" rx="6" fill="#2e2e2e"/>

  <!-- "GL" letters -->
  <text
    x="256" y="316"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="240"
    font-weight="bold"
    font-style="italic"
    text-anchor="middle"
    fill="url(#letterGrad)"
    letter-spacing="-8"
  >GL</text>

  <!-- Thin amber underline accent -->
  <rect x="104" y="338" width="304" height="5" rx="2.5" fill="#c8952e" opacity="0.7"/>

  <!-- Vignette overlay -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#vignette)"/>
</svg>
